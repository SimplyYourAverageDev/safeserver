name: Release to Modrinth

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      changelog:
        description: "Changelog text for the Modrinth release"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  release:
    name: Publish Modrinth version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG_TEXT: ${{ inputs.changelog || format('Automated release for {0}', github.ref_name) }}
        run: scripts/publish_modrinth.sh --changelog-text "$CHANGELOG_TEXT"
